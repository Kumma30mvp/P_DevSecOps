name: DevSecOps Pipeline

# Pipeline CI/CD con seguridad integrada (SAST, DAST, SCA, secret y container scan).
# Orientado a generar EVIDENCIA academica: cada job escribe en reports/ y sube
# su salida como artifact descargable. Los jobs de seguridad usan
# continue-on-error para recolectar hallazgos sin abortar el pipeline.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: devsecops-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_NAME: devsecops-api:latest
  PYTHON_VERSION: "3.12"

jobs:
  # 1) VALIDATE - chequeo rapido de que el codigo importa y compila
  validate:
    name: 1 - Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Compile sources
        run: python -m py_compile app/__init__.py app/main.py app/models.py app/storage.py

      - name: Import app
        run: python -c "import app.main; print('app.main importado OK')"

  # 2) TEST - unit tests con pytest (unico gate duro)
  test:
    name: 2 - Test
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pytest
        run: |
          mkdir -p reports
          pytest -v --junitxml=reports/pytest-report.xml | tee reports/pytest-output.txt

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: report-test
          path: reports/
          if-no-files-found: warn

  # 3) BUILD - construye la imagen y la exporta como artifact (para reusar en scans)
  build:
    name: 3 - Build image
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t "$IMAGE_NAME" .

      - name: Save image to tar
        run: docker save "$IMAGE_NAME" -o image.tar

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: image.tar
          retention-days: 1

  # 4) SECRET SCAN - Gitleaks
  secret-scan:
    name: 4 - Secret scan (Gitleaks)
    runs-on: ubuntu-latest
    needs: validate
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        run: |
          mkdir -p reports
          docker run --rm -v "${{ github.workspace }}:/repo" zricethezav/gitleaks:latest \
            detect --source=/repo --no-git \
            --report-format=json \
            --report-path=/repo/reports/gitleaks-report.json \
            --redact --exit-code 0
          sudo chmod -R a+rX reports || true

      - name: Upload Gitleaks report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: report-gitleaks
          path: reports/gitleaks-report.json
          if-no-files-found: warn

  # 5) SCA SCAN - Trivy filesystem (dependencias y codigo)
  sca-scan:
    name: 5 - SCA scan (Trivy fs)
    runs-on: ubuntu-latest
    needs: validate
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Prepare reports dir
        run: mkdir -p reports

      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          format: json
          output: reports/trivy-fs-report.json
          severity: CRITICAL,HIGH,MEDIUM,LOW
          exit-code: "0"

      - name: Upload Trivy fs report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: report-trivy-fs
          path: reports/trivy-fs-report.json
          if-no-files-found: warn

  # 6) SAST SCAN - Semgrep (SARIF + JSON)
  sast-scan:
    name: 6 - SAST scan (Semgrep)
    runs-on: ubuntu-latest
    needs: validate
    continue-on-error: true
    container:
      image: semgrep/semgrep:latest
    steps:
      - uses: actions/checkout@v4

      - name: Semgrep scan (SARIF)
        run: |
          mkdir -p reports
          semgrep scan --config p/ci --config p/python \
            --sarif --output reports/semgrep-report.sarif || true

      - name: Semgrep scan (JSON)
        run: |
          semgrep scan --config p/ci --config p/python \
            --json --output reports/semgrep-report.json || true

      - name: Upload Semgrep reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: report-semgrep
          path: |
            reports/semgrep-report.sarif
            reports/semgrep-report.json
          if-no-files-found: warn

  # 7) CONTAINER SCAN - Trivy image (sobre la imagen construida)
  container-scan:
    name: 7 - Container scan (Trivy image)
    runs-on: ubuntu-latest
    needs: build
    continue-on-error: true
    steps:
      - name: Download image artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-image

      - name: Load image
        run: docker load -i image.tar

      - name: Prepare reports dir
        run: mkdir -p reports

      - name: Trivy image scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: image
          image-ref: ${{ env.IMAGE_NAME }}
          format: json
          output: reports/trivy-image-report.json
          severity: CRITICAL,HIGH,MEDIUM,LOW
          exit-code: "0"

      - name: Upload Trivy image report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: report-trivy-image
          path: reports/trivy-image-report.json
          if-no-files-found: warn

  # 8) DAST SCAN - levanta la app y corre OWASP ZAP Baseline
  dast-scan:
    name: 8 - DAST scan (OWASP ZAP)
    runs-on: ubuntu-latest
    needs: build
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Download image artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-image

      - name: Load image
        run: docker load -i image.tar

      - name: Start app container
        run: docker run -d --name devsecops-app -p 8000:8000 "$IMAGE_NAME"

      - name: Wait for /health
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8000/health; then
              echo ""
              echo "App lista en intento $i"
              exit 0
            fi
            echo "Esperando app... ($i)"
            sleep 2
          done
          echo "La app no respondio a tiempo"; docker logs devsecops-app; exit 1

      - name: Run OWASP ZAP Baseline
        run: |
          mkdir -p reports
          chmod -R a+rwX reports
          docker run --rm --network host \
            -v "${{ github.workspace }}:/zap/wrk:rw" \
            ghcr.io/zaproxy/zaproxy:stable \
            zap-baseline.py \
            -t http://localhost:8000 \
            -J reports/zap-report.json \
            -r reports/zap-report.html \
            -c .zap/rules.tsv \
            -I || true
          sudo chmod -R a+rX reports || true

      - name: Stop app container
        if: always()
        run: docker rm -f devsecops-app || true

      - name: Upload ZAP report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: report-zap
          path: |
            reports/zap-report.html
            reports/zap-report.json
          if-no-files-found: warn

  # 9 + 10) UPLOAD-ARTIFACTS consolidado + SECURITY SUMMARY
  security-summary:
    name: 9-10 - Security summary
    runs-on: ubuntu-latest
    needs: [test, secret-scan, sca-scan, sast-scan, container-scan, dast-scan]
    if: always()
    steps:
      - name: Download all reports
        uses: actions/download-artifact@v4
        with:
          path: downloaded

      - name: Consolidate reports
        run: |
          mkdir -p reports
          find downloaded -type f \( -name '*.json' -o -name '*.sarif' -o -name '*.html' -o -name '*.xml' -o -name '*.txt' \) \
            -exec cp -f {} reports/ \; || true
          echo "Contenido de reports/:"; ls -la reports/ || true

      - name: Generate security summary
        run: |
          python3 <<'PY'
          import json, os, glob, datetime

          R = "reports"

          def load(path):
              try:
                  with open(path, encoding="utf-8") as f:
                      return json.load(f)
              except Exception:
                  return None

          def count_trivy(path):
              data = load(path)
              if not data:
                  return "N/D"
              total = 0
              for res in (data.get("Results") or []):
                  total += len(res.get("Vulnerabilities") or [])
              return total

          def count_gitleaks(path):
              data = load(path)
              if isinstance(data, list):
                  return len(data)
              return "N/D"

          def count_semgrep(path):
              data = load(path)
              if not data:
                  return "N/D"
              return len(data.get("results") or [])

          def count_zap(path):
              data = load(path)
              if not data:
                  return "N/D"
              total = 0
              for site in (data.get("site") or []):
                  total += len(site.get("alerts") or [])
              return total

          def exists(name):
              return "OK" if os.path.exists(os.path.join(R, name)) else "FALTA"

          rows = [
              ("Secret scan (Gitleaks)", "gitleaks-report.json", count_gitleaks(os.path.join(R, "gitleaks-report.json"))),
              ("SCA (Trivy filesystem)", "trivy-fs-report.json", count_trivy(os.path.join(R, "trivy-fs-report.json"))),
              ("SAST (Semgrep)", "semgrep-report.json", count_semgrep(os.path.join(R, "semgrep-report.json"))),
              ("Container (Trivy image)", "trivy-image-report.json", count_trivy(os.path.join(R, "trivy-image-report.json"))),
              ("DAST (OWASP ZAP)", "zap-report.json", count_zap(os.path.join(R, "zap-report.json"))),
          ]

          now = datetime.datetime.utcnow().strftime("%Y-%m-%d %H:%M UTC")
          lines = []
          lines.append("# Resumen de seguridad - DevSecOps Pipeline")
          lines.append("")
          lines.append("- Generado: " + now)
          lines.append("- Commit: " + os.environ.get("GITHUB_SHA", "N/D"))
          lines.append("- Workflow run: " + os.environ.get("GITHUB_RUN_ID", "N/D"))
          lines.append("")
          lines.append("| Herramienta | Reporte | Estado | Hallazgos |")
          lines.append("|---|---|---|---|")
          for tool, fname, count in rows:
              lines.append("| " + tool + " | `" + fname + "` | " + exists(fname) + " | " + str(count) + " |")
          lines.append("")
          lines.append("> Nota academica: `/admin/status` esta SIN autenticacion de forma")
          lines.append("> intencional como hallazgo controlado (OWASP A01 / STRIDE:")
          lines.append("> Information Disclosure + Elevation of Privilege). Los jobs de")
          lines.append("> seguridad usan continue-on-error para recolectar evidencia aunque")
          lines.append("> existan hallazgos.")
          lines.append("")
          lines.append("## Artifacts disponibles en reports/")
          for f in sorted(glob.glob(os.path.join(R, "*"))):
              lines.append("- `" + os.path.basename(f) + "`")
          lines.append("")

          os.makedirs(R, exist_ok=True)
          with open(os.path.join(R, "security-summary.md"), "w", encoding="utf-8") as f:
              f.write("\n".join(lines))
          print("\n".join(lines))
          PY

      - name: Add summary to GitHub run page
        if: always()
        run: cat reports/security-summary.md >> "$GITHUB_STEP_SUMMARY" || true

      - name: Upload consolidated reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: devsecops-reports
          path: reports/
          if-no-files-found: warn
